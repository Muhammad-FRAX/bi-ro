# keycloak.test.compose.yaml
# Developer-only: spins up a throwaway Keycloak instance for testing AUTH_MODE=keycloak.
# NOT part of the production bi-ro stack (§7.3). Use separately:
#
#   docker compose -f keycloak.test.compose.yaml up -d
#
# Then configure BI-Ro with:
#   AUTH_MODE=keycloak
#   KEYCLOAK_ISSUER=http://localhost:8080/realms/biro
#   KEYCLOAK_CLIENT_ID=bi-ro
#   KEYCLOAK_CLIENT_SECRET=<client-secret-from-keycloak>
#   KEYCLOAK_REDIRECT_URI=http://localhost:5000/api/auth/keycloak/callback
#
# Admin UI: http://localhost:8080  (admin / admin)
# Create realm "biro", client "bi-ro" (confidential, authorization code + PKCE),
# add test users, and map your Keycloak groups/roles to BI-Ro roles via
#   Settings → Auth Mappings in the BI-Ro admin UI.

services:
  keycloak-test:
    image: quay.io/keycloak/keycloak:26
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: "8080"
      KC_DB: dev-file
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
